{% extends "base.html" %}
{% block title %}Network Graph — LinkForge{% endblock %}

{% block head %}
<script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
{% endblock %}

{% block content %}
<div class="container" style="max-width:1100px;">
  <div class="graph-header">Network Topology</div>

  <div class="graph-controls">
    <select id="node-count" class="select-styled">
      <option value="50">50 nodes</option>
      <option value="80" selected>80 nodes</option>
      <option value="120">120 nodes</option>
      <option value="200">200 nodes</option>
    </select>
    <button class="btn btn-primary" onclick="loadGraph()" id="render-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Render
    </button>
    <span id="graph-info"></span>
  </div>

  <div id="graph-container"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let network = null;

  // Adaptive colors based on theme
  function getGraphColors() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    return {
      nodeBg: isDark ? '#1e293b' : '#ffffff',
      nodeBorder: '#6366f1',
      nodeHighlightBg: isDark ? '#312e81' : '#e0e7ff',
      nodeHighlightBorder: '#818cf8',
      nodeHoverBg: isDark ? '#1e293b' : '#f1f5f9',
      nodeHoverBorder: '#a78bfa',
      fontColor: isDark ? '#e2e8f0' : '#1e293b',
      edgeColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.12)',
      edgeHighlight: '#6366f1',
      edgeHover: '#8b5cf6',
    };
  }

  function loadGraph() {
    const maxNodes = document.getElementById('node-count').value;
    document.getElementById('graph-info').innerHTML = '<span class="loader"></span> Loading graph…';

    fetch(`/api/graph?max_nodes=${maxNodes}`)
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('graph-container');
        const c = getGraphColors();

        const nodes = new vis.DataSet(data.nodes.map(n => ({
          id: n.id,
          label: n.label,
          color: {
            background: c.nodeBg,
            border: c.nodeBorder,
            highlight: { background: c.nodeHighlightBg, border: c.nodeHighlightBorder },
            hover: { background: c.nodeHoverBg, border: c.nodeHoverBorder },
          },
          font: { color: c.fontColor, size: 11, face: 'Inter' },
          borderWidth: 1.5,
        })));

        const edges = new vis.DataSet(data.edges.map(e => ({
          from: e.from,
          to: e.to,
          arrows: { to: { enabled: true, scaleFactor: 0.4 } },
          color: { color: c.edgeColor, highlight: c.edgeHighlight, hover: c.edgeHover },
          width: 1,
          smooth: { type: 'curvedCW', roundness: 0.2 },
        })));

        const options = {
          physics: {
            forceAtlas2Based: {
              gravitationalConstant: -60,
              centralGravity: 0.005,
              springLength: 120,
              springConstant: 0.08,
            },
            maxVelocity: 50,
            solver: 'forceAtlas2Based',
            timestep: 0.35,
            stabilization: { iterations: 150 },
          },
          interaction: { hover: true, tooltipDelay: 150, zoomView: true, dragView: true },
          nodes: { shape: 'dot', size: 10 },
        };

        if (network) network.destroy();
        network = new vis.Network(container, { nodes, edges }, options);

        network.on('click', params => {
          if (params.nodes.length) window.open(params.nodes[0], '_blank');
        });

        document.getElementById('graph-info').textContent =
          `${data.nodes.length} nodes · ${data.edges.length} edges`;
      });
  }

  // Re-render graph when theme changes
  document.getElementById('theme-toggle').addEventListener('click', () => {
    setTimeout(() => { if (network) loadGraph(); }, 100);
  });

  loadGraph();
</script>
{% endblock %}
